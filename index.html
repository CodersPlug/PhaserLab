<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PhaserLab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #5b8dd9;            /* matches game sky so FIT bars are invisible */
      touch-action: none;            /* stop browser gestures stealing touch */
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    /* The canvas mounts INSIDE this div (config.parent = 'game').
       Centering here guarantees it is always in view. */
    #game {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
